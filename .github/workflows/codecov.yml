
name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

      - name: Upload coverage
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: fox
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

      - name: Skip Codecov upload when token is missing
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: |
          echo "CODECOV_TOKEN is not set."
          echo "Codecov upload skipped."
          echo "For protected branches, add CODECOV_TOKEN to repository secrets."
          echo "See https://docs.codecov.com/docs/codecov-tokens"