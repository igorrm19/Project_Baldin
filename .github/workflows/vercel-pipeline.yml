name: Vercel Production Pipeline

# Configuração de gatilhos: executa em Pushes para a branch main e em qualquer Pull Request para a main.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Variáveis de ambiente globais
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  NODE_VERSION: 22

jobs:
  validate:
    name: Validate and Build
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Configuração do Node.js com cache de dependências
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # 3. Instalação limpa de dependências (Enterprise Best Practice)
      - name: Install root dependencies
        run: npm ci

      # 4. Validação de Variáveis de Ambiente Obrigatórias
      - name: Validate Environment Variables
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then echo "VERCEL_TOKEN is missing"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then echo "VERCEL_ORG_ID is missing"; exit 1; fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then echo "VERCEL_PROJECT_ID is missing"; exit 1; fi
          echo "All required secrets are present."

      # 5. Validação de TypeScript (Fail-fast)
      - name: TypeScript Static Analysis
        run: npm run typecheck

      # 6. Execução de Linting
      - name: Run ESLint
        run: npm run lint

      # 7. Execução de Testes Automatizados (se existirem)
      - name: Run Tests
        run: npm test || echo "No tests found or tests failed"

      # 8. Instalação da Vercel CLI
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 9. Vercel Pull (Baixa as configurações do projeto da Vercel)
      # Isso detecta se o VERCEL_ORG_ID ou VERCEL_PROJECT_ID estão incorretos.
      - name: Vercel Pull (Environment Setup)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # 10. Vercel Build (Simula o build real da Vercel)
      # Esta etapa detecta: imports quebrados, erros de case sensitivity, problemas ESM/CJS,
      # e erros específicos de Serverless Functions (ex: /api routes).
      - name: Vercel Build (Local Simulation)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # 11. E2E Smoke Test (Garante que a tela renderiza sem erros 404/Console)
      - name: Run E2E Smoke Test
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

      # 12. (OPCIONAL) Vercel Dev & Health Check
      # Inicia o servidor local da Vercel e testa um endpoint.
      - name: Local Health Check (Vercel Dev)
        run: |
          vercel dev --token=${{ secrets.VERCEL_TOKEN }} &
          echo "Waiting for local server to start..."
          sleep 10
          # Tenta acessar o health check (ajuste o endpoint se necessário)
          curl -s --fail http://localhost:3000/api/health || echo "Health check failed or endpoint not found"
          # Finaliza o processo do vercel dev
          kill $(lsof -t -i:3000) || true

      # 12. Logs de Sucesso
      - name: Cleanup and Summary
        if: success()
        run: echo "Validation successful. Ready for deployment."

    # Logs claros e organizados em caso de falha
    continue-on-error: false
