<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .box { fill: #f7fbff; stroke: #2f6f9f; stroke-width: 2; rx: 16; }
    .box2 { fill: #fff6d8; stroke: #b58900; stroke-width: 2; rx: 16; }
    .box3 { fill: #eef7eb; stroke: #237a3b; stroke-width: 2; rx: 16; }
    .title { font: bold 20px Arial, sans-serif; fill: #0f1f4e; }
    .text { font: 16px Arial, sans-serif; fill: #1a2c4f; }
    .small { font: 14px Arial, sans-serif; fill: #0f1f4e; }
    .arrow { stroke: #2f6f9f; stroke-width: 3; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f6f9f" />
    </marker>
  </defs>

  <rect class="box" x="40" y="30" width="1120" height="160" />
  <text class="title" x="60" y="60">Browser SPA / App Entry</text>
  <text class="text" x="60" y="92">index.html → src/main.ts → FoxRouter → Pages</text>
  <text class="small" x="60" y="120">Client entry point, root container, CSRF token meta, and router bootstrap.</text>

  <rect class="box2" x="60" y="220" width="500" height="210" />
  <text class="title" x="80" y="250">Application Pages</text>
  <text class="small" x="80" y="280">MainPage, AboutPage, CadastroPage, HomePage</text>
  <text class="small" x="80" y="305">Pages mount HTML, components and event bindings.</text>
  <text class="small" x="80" y="330">Each page implements mount() and optional unmount().</text>

  <rect class="box2" x="640" y="220" width="500" height="210" />
  <text class="title" x="660" y="250">Login / Registration Feature</text>
  <text class="small" x="660" y="280">Login, Cadastro, CardLogin components.</text>
  <text class="small" x="660" y="305">Client validation, button/input parsing, navigation.</text>
  <text class="small" x="660" y="330">Uses services for API communication and CSRF protection.</text>

  <rect class="box" x="340" y="470" width="520" height="220" />
  <text class="title" x="360" y="500">Fox Framework Core</text>
  <text class="small" x="360" y="530">BaseModel + Main wrapper + DOM helpers + actionStack</text>
  <text class="text" x="360" y="560">BaseModel:</text>
  <text class="small" x="380" y="585">• Template interpolation {{ }}</text>
  <text class="small" x="380" y="610">• HTML escape for XSS mitigation</text>
  <text class="small" x="380" y="635">• <Axe id="..." /> component composition</text>
  <text class="text" x="360" y="660">DOM Helpers:</text>
  <text class="small" x="380" y="685">• parseButton, parseInput, parserDiv</text>
  <text class="small" x="380" y="710">• event binding and element parsing</text>

  <rect class="box3" x="40" y="720" width="1120" height="120" />
  <text class="title" x="60" y="760">CI & Quality Pipeline</text>
  <text class="small" x="60" y="790">Typecheck, ESLint, HTML validation, a11y, bundle check, dependency audit</text>
  <text class="small" x="60" y="815">Built for developer confidence and production readiness.</text>

  <line class="arrow" x1="600" y1="190" x2="600" y2="220" />
  <line class="arrow" x1="600" y1="430" x2="600" y2="470" />
  <line class="arrow" x1="560" y1="530" x2="280" y2="430" />
  <line class="arrow" x1="640" y1="530" x2="920" y2="430" />
  <line class="arrow" x1="600" y1="680" x2="600" y2="720" />

  <text class="title" x="760" y="430">Service Layer</text>
  <text class="small" x="760" y="455">LoginServices → Fetch API → /users</text>
  <text class="small" x="760" y="480">Uses credentials: 'include' and X-CSRF-Token</text>

  <line class="arrow" x1="640" y1="440" x2="760" y2="440" />
</svg>