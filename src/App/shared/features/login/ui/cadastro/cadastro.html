<div class="flex items-center justify-center flex-col">
    <img src="/Rosto Geométrico de Raposa (1).png" alt="raposa svg" class="w-20 h-20 mb-1 rounded-full object-fill">

    <div class="flex">
        <h1 class="text-4xl text-orange-700 mb-1 font-medium">Create</h1>
        <span class="text-4xl text-amber-900 mb-1 font-medium">Mother</span>
    </div>

    <h3 class="text-zinc-600 font-serif text-lg">Create your account to continue</h3>
</div>

<div>
    <form onsubmit="event.preventDefault()" class="responsive-form">

        <div>
            <label for="email" class="block text-base font-medium text-gray-700 mb-1">Email</label>
            <input placeholder="your@email.com" type="email" name="email" id="email"
                class="w-full px-7 py-4 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="password" class="block text-base font-medium text-gray-700 mb-1">Password</label>
            <input placeholder="......." type="password" name="password" id="password"
                class="w-full px-7 py-4 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label for="confirm_password" class="block text-base font-medium text-gray-700 mb-1">Confirm
                Password</label>
            <input placeholder="......." type="password" name="confirm_password" id="confirm_password"
                class="w-full px-7 py-4 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <p id="error-message" class="text-red-500 text-sm mb-2 hidden"></p>
        <button id="button" type="submit" onclick="myButton()"
            class="w-full bg-green-800 text-white py-4 px-4 rounded-lg hover:bg-blue-700 transition !mt-5">
            Sign Up
        </button>

        <div class="mb-7 flex items-center justify-center w-full">
            <h1 class="text-gray-950 font-medium text-base">
                Already have an account?
                <a href="/login" class="text-amber-800 font-medium text-base cursor-pointer hover:underline">
                    Login
                </a>
            </h1>
        </div>

        <div class="!mt-7">
            <hr class="border-solid border-gray-300">
        </div>

        <div>
            <button type="button" id="button2" onclick="myButton2()"
                class="w-full bg-slate-900 text-white py-4 px-4 rounded-lg hover:bg-blue-700 transition flex items-center justify-center">

                <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="!mr-2"
                    viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.8 11.8 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7 7 0 0 0 1.048-.625 11.8 11.8 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.54 1.54 0 0 0-1.044-1.263 63 63 0 0 0-2.887-.87C9.843.266 8.69 0 8 0m0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5" />
                </svg>

                Access as administrator
            </button>
        </div>

    </form>
</div>
